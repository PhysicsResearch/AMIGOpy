name: Build AMIGOpy — unsigned (GUI only)

on:
  push:
    branches: [ Development ]
  workflow_dispatch:
    inputs:
      app_version:
        description: "Installer version (optional)"
        required: false
        default: ""

jobs:
  build-amigopy:
    runs-on: windows-latest
    env:
      KMP_DUPLICATE_LIB_OK: "TRUE"
      # Guard against stray Qt discovery
      PYSIDE_DISABLE_INTERNAL_QT_CONF: "1"
      QT_PLUGIN_PATH: ""
      QT_QPA_PLATFORM_PLUGIN_PATH: ""
      # Cache dir for Nuitka downloads/depends
      NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keep your conda env for other tasks; compile happens in an isolated venv
      - name: Setup Miniconda (builder env)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: "3.11"
          environment-file: amigo.yml
          activate-environment: amigo
          auto-update-conda: true
          channels: conda-forge,defaults
          mamba-version: "*"
          use-mamba: true

      - name: Upgrade pip tooling (inside conda env)
        shell: powershell
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Cache Nuitka cache
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-nuitka-${{ hashFiles('**/*.py', '.github/workflows/build-amigopy.yml') }}
          restore-keys: ${{ runner.os }}-nuitka-

      # -------------------- BUILD (isolated) --------------------
      - name: Build with Nuitka (GUI only, isolated venv)
        shell: powershell
        env:
          PYSIDE_DISABLE_INTERNAL_QT_CONF: "1"
          QT_PLUGIN_PATH: ""
          QT_QPA_PLATFORM_PLUGIN_PATH: ""
          MPLBACKEND: "Agg"
        run: |
          # 1) Clean venv
          python -m venv venv-build
          $venvScripts = "$(Resolve-Path .\venv-build\Scripts)"

          # 2) Scrub PATH so conda DLLs aren't visible during build
          $oldPath = $env:Path
          $env:Path = "$venvScripts;$env:SystemRoot\system32;$env:SystemRoot"

          # 3) Install runtime deps (match what the GUI actually imports)
          python -m pip install --upgrade pip wheel setuptools

          # Qt + core imaging stack
          pip install "pyside6==6.7.3" pillow pydicom
          pip install "numpy==1.26.*" "scipy==1.12.*"
          pip install "scikit-image==0.22.*" "nibabel==5.*" "SimpleITK==2.5.*"
          pip install "opencv-python-headless==4.10.*"

          # Styling + visualization
          pip install "qdarkstyle>=3.1" "qstylizer>=0.2.2"
          pip install "vtk==9.3.1"
          pip install "matplotlib==3.8.*"

          # Builder
          pip install "nuitka>=2.2" ordered-set zstandard

          # 4) Sanity check (also confirms big libs import)
          python -c "import PySide6.QtCore as QC; import vtkmodules, qdarkstyle, skimage, nibabel, SimpleITK, cv2, numpy, scipy, matplotlib; print('✅ Imports OK:', QC.__file__)"

          # 4.1) Resolve absolute source path of vtkmodules for --include-data-dir
          $vtkSrc = python -c "import os, vtkmodules; print(os.path.dirname(vtkmodules.__file__))"
          $vtkSrc = ($vtkSrc.Trim() -replace '\\','/')
          $vtkDataArg = "--include-data-dir=$vtkSrc=vtkmodules"

          # 5) Build args as an array (no fragile line continuations)
          $args = @(
            "Launch_ImGUI.py",
            "--standalone",
            "--remove-output",
            "--output-dir=dist\AMIGOpy",
            "--enable-plugin=pyside6",
            "--include-qt-plugins=platforms,imageformats,styles",
            "--windows-console-mode=force",
            "---report=dist\AMIGOpy\build_report.html".Replace("---","--"),  # avoid YAML parsing of --report
            "--assume-yes-for-downloads",

            "--include-package=pydicom",
            "--include-package-data=pydicom",
            "--include-package=PIL",

            "--include-package=numpy",
            "--include-package=scipy",

            "--include-package=skimage",
            "--include-package-data=skimage",

            "--include-package=nibabel",

            "--include-package=SimpleITK",

            "--include-package=cv2",

            "--include-package=vtkmodules",
            "--include-package=vtkmodules.qt",

            "--include-package=qdarkstyle",
            "--include-package-data=qdarkstyle",
            "--include-package=qstylizer",

            "--include-package=matplotlib",
            "--include-package-data=matplotlib",

            "--nofollow-import-to=totalsegmentator",
            "--nofollow-import-to=torch",
            "--nofollow-import-to=torchvision",
            "--nofollow-import-to=monai",
            "--nofollow-import-to=nnunet",
            "--nofollow-import-to=nnunetv2",
            "--nofollow-import-to=einops",
            "--nofollow-import-to=tqdm",
            "--nofollow-import-to=fastapi",
            "--nofollow-import-to=starlette",
            "--nofollow-import-to=uvicorn",
            "--nofollow-import-to=pydantic",

            "--include-data-files=icons\ruler.png=icons\ruler.png",
            "--include-data-files=icons\dcm_insp.png=icons\dcm_insp.png",
            "--include-data-files=icons\brush.png=icons\brush.png",
            "--include-data-files=icons\eraser.png=icons\eraser.png",
            "--include-data-files=icons\layout.png=icons\layout.png",
            "--include-data-files=icons\roi_point.png=icons\roi_point.png",
            "--include-data-files=icons\roi_circle.png=icons\roi_circle.png",
            "--include-data-files=icons\roi_ellipse.png=icons\roi_ellipse.png",
            "--include-data-files=icons\roi_square.png=icons\roi_square.png",
            "--include-data-files=icons\undo.png=icons\undo.png",
            "--include-data-dir=fcn_ctcal\ct_cal_curves=fcn_ctcal\ct_cal_curves",
            "--include-data-files=fcn_materialassignment\materials_db.csv=fcn_materialassignment\materials_db.csv"
          )

          # Insert the dynamic VTK data include
          $args += $vtkDataArg

          # 6) Compile (non-interactive)
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          python -m nuitka @args

          # 7) Restore PATH
          $env:Path = $oldPath

      # -------- Flatten Nuitka .dist folder to match your Inno script --------
      - name: Flatten Nuitka dist into dist\AMIGOpy
        shell: powershell
        run: |
          $root = "dist\AMIGOpy"
          $src  = Join-Path $root "Launch_ImGUI.dist"
          if (!(Test-Path $src)) { throw "Expected $src not found" }
          Copy-Item -Path "$src\*" -Destination $root -Recurse -Force
          Remove-Item -Path $src -Recurse -Force

      - name: Verify dist contents (GUI only)
        shell: powershell
        run: |
          if (-not (Test-Path "dist\AMIGOpy\Launch_ImGUI.exe")) { throw "Launch_ImGUI.exe missing" }
          Get-ChildItem -Recurse dist\AMIGOpy | Select-Object -First 40 | Format-List -Property FullName,Length

      - name: Zip portable build
        shell: powershell
        run: |
          Compress-Archive -Path "dist/AMIGOpy/*" -DestinationPath "AMIGOpy-win-portable.zip" -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMIGOpy-win-portable
          path: AMIGOpy-win-portable.zip
          if-no-files-found: error
          overwrite: true

      # -------------------- INNO SETUP (Chocolatey, robust) --------------------
      - name: Ensure Inno Setup (ISCC) is installed
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $iscc = "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            if (!(Test-Path $iscc)) {
              $isccAlt = "${Env:ProgramFiles}\Inno Setup 6\ISCC.exe"
              if (Test-Path $isccAlt) { $iscc = $isccAlt } else { throw "ISCC.exe not found after install." }
            }
          }
          # Do not fail if help returns non-zero
          try { & $iscc /? | Out-Null } catch { Write-Host "ISCC present; ignoring non-zero help exit." }
          $global:LASTEXITCODE = 0

      - name: Build AMIGOpy installer
        shell: powershell
        run: |
          $iscc = "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "${Env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          & $iscc AMIGOpy.iss

      - name: Upload installer (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: AMIGOpy-Installer-unsigned
          path: Output/AMIGOpy-Setup*.exe
          if-no-files-found: error
          overwrite: true
